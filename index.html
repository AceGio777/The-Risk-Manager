<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Risk Manager | Precision Sizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f4f5; --surface: #ffffff; --border: #e4e4e7;
    --text: #09090b; --muted: #71717a; --accent: #0891b2;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 20px; transition: background 0.3s; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .title { font-family: var(--syne); font-size: 18px; font-weight: 700; text-transform: uppercase; }

  /* Input Grid */
  .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  input { 
    background: var(--surface); border: 1px solid var(--border); color: var(--text); 
    padding: 12px; border-radius: 8px; font-family: var(--mono); outline: none; transition: 0.2s;
  }
  input:focus { border-color: var(--accent); }

  /* Risk Selector */
  .risk-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .risk-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 8px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s;
  }
  .risk-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(34, 211, 238, 0.05); }

  /* Output Display */
  .result-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; text-align: center; position: relative; overflow: hidden;
  }
  .result-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .result-val { font-family: var(--syne); font-size: 32px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .result-sub { font-size: 11px; color: var(--muted); }

  /* Kill Switch Style */
  .danger-zone { border-color: var(--red) !important; }
  .danger-text { color: var(--red) !important; }

  .theme-toggle {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px; border-radius: 4px; cursor: pointer; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body data-theme="dark">

  <div class="header">
    <span class="title">Risk Manager</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="input-section">
    <div class="input-group">
      <label>Account Balance ($)</label>
      <input type="number" id="balance" value="50000" oninput="calculateRisk()">
    </div>
    <div class="input-group">
      <label>Stop Loss (Pips/Pts)</label>
      <input type="number" id="sl-distance" value="10" oninput="calculateRisk()">
    </div>
  </div>

  <label style="display:block; margin-bottom:8px;">Select Risk %</label>
  <div class="risk-selector">
    <button class="risk-btn" onclick="setRisk(0.25, this)">0.25%</button>
    <button class="risk-btn" onclick="setRisk(0.5, this)">0.50%</button>
    <button class="risk-btn active" onclick="setRisk(1, this)">1.00%</button>
  </div>

  <div class="result-card" id="main-display">
    <div class="result-label">Position Size (Lots)</div>
    <div class="result-val" id="lot-size">0.00</div>
    <div class="result-sub" id="dollar-risk">Risking: $0.00</div>
  </div>

  <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
    <label>Daily Max Loss: <span id="max-loss-display" class="result-sub" style="color: var(--red)">$500</span></label>
    <input type="range" id="max-loss-slider" min="100" max="2000" step="100" value="500" style="width: 100px;" oninput="updateMaxLoss()">
  </div>

<script>
  let currentRiskPercent = 1.0;

  function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  function setRisk(val, btn) {
    currentRiskPercent = val;
    document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calculateRisk();
  }

  function updateMaxLoss() {
    const val = document.getElementById('max-loss-slider').value;
    document.getElementById('max-loss-display').textContent = '$' + val;
    calculateRisk();
  }

  function calculateRisk() {
    const balance = parseFloat(document.getElementById('balance').value) || 0;
    const sl = parseFloat(document.getElementById('sl-distance').value) || 0;
    
    // Standard Forex calculation: (Balance * Risk%) / (SL * PipValue)
    // Assuming standard lot where 1 pip = $10 on 1.0 lot for simplicity
    const dollarRisk = balance * (currentRiskPercent / 100);
    let lots = 0;
    
    if (sl > 0) {
      lots = dollarRisk / (sl * 10); 
    }

    // Update UI
    document.getElementById('lot-size').textContent = lots.toFixed(2);
    document.getElementById('dollar-risk').textContent = `Risking: $${dollarRisk.toLocaleString()}`;

    // Kill Switch Logic (Visual only for now)
    const maxLoss = parseFloat(document.getElementById('max-loss-slider').value);
    const display = document.getElementById('main-display');
    
    if (dollarRisk > maxLoss) {
      display.classList.add('danger-zone');
      document.getElementById('lot-size').classList.add('danger-text');
    } else {
      display.classList.remove('danger-zone');
      document.getElementById('lot-size').classList.remove('danger-text');
    }
  }

  window.onload = calculateRisk;
</script>
</body>
</html>
